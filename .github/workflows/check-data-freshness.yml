name: Data Freshness Check

on:
  schedule:
    # Run twice a year: March 20 and September 20 at 09:00 UTC.
    # The axe-to-FPS mapping should be reviewed every 6 months to keep pace
    # with axe-core releases and any updates to the CAN/ASC EN 301 549 standard.
    - cron: '0 9 20 3 *'
    - cron: '0 9 20 9 *'
  workflow_dispatch:
    inputs:
      check_date:
        description: 'Override check date (YYYY-MM-DD, defaults to today)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Statistics Canada data freshness
        id: stats_freshness
        shell: bash
        run: |
          CHECK_DATE="${{ inputs.check_date }}"
          if [[ -z "$CHECK_DATE" ]]; then
            CHECK_DATE=$(date -u +%Y-%m-%d)
          fi
          echo "check_date=$CHECK_DATE" >> "$GITHUB_OUTPUT"

          node --input-type=module <<'EOF'
          import { STATISTICS_CANADA_DISABILITY_STATS, isStatsDataStale } from './src/data/statistics-canada-disability-stats.js';

          const checkDate = process.env.CHECK_DATE || new Date().toISOString().slice(0, 10);
          const stale = isStatsDataStale(checkDate);

          console.log('CSD vintage year:  ', STATISTICS_CANADA_DISABILITY_STATS.vintage_year);
          console.log('Next review date:  ', STATISTICS_CANADA_DISABILITY_STATS.next_review_date);
          console.log('Check date:        ', checkDate);
          console.log('Is stale:          ', stale);

          if (stale) {
            console.log('::warning::Statistics Canada disability data in src/data/statistics-canada-disability-stats.js is past its review date.');
            process.exitCode = 1;
          } else {
            console.log('Statistics Canada data is current. No action needed.');
          }
          EOF
        env:
          CHECK_DATE: ${{ steps.stats_freshness.outputs.check_date }}

      - name: Check axe-to-FPS mapping freshness
        id: axe_freshness
        if: success() || failure()
        shell: bash
        run: |
          CHECK_DATE="${{ inputs.check_date || steps.stats_freshness.outputs.check_date }}"

          node --input-type=module <<'EOF'
          // The axe-to-FPS mapping review date is encoded as a comment in the file.
          // Here we check the installed axe-core version and flag if it has advanced
          // beyond the version the mapping was last reviewed against.
          import { readFileSync } from 'node:fs';
          import { createRequire } from 'node:module';

          const require = createRequire(import.meta.url);
          let installedVersion = 'unknown';
          try {
            const pkg = require('@axe-core/playwright/package.json');
            installedVersion = pkg.version ?? 'unknown';
          } catch {
            try {
              const pkg = require('axe-core/package.json');
              installedVersion = pkg.version ?? 'unknown';
            } catch {
              // version not determinable
            }
          }

          // Read the review schedule comment from axe-to-fps.js
          const src = readFileSync('./src/data/axe-to-fps.js', 'utf8');
          const match = src.match(/Next review:\s*(\d{4}-\d{2}-\d{2})/);
          const nextReview = match?.[1] ?? null;
          const checkDate = process.env.CHECK_DATE || new Date().toISOString().slice(0, 10);

          console.log('Installed axe version: ', installedVersion);
          console.log('axe-to-FPS next review:', nextReview ?? '(not set)');
          console.log('Check date:            ', checkDate);

          if (nextReview && checkDate >= nextReview) {
            console.log('::warning::axe-to-FPS mapping in src/data/axe-to-fps.js is past its review date. Review for new or changed axe-core rules.');
            process.exitCode = 1;
          } else {
            console.log('axe-to-FPS mapping is current. No action needed.');
          }
          EOF
        env:
          CHECK_DATE: ${{ inputs.check_date || steps.stats_freshness.outputs.check_date }}

      - name: Open issue if any data is stale
        if: |
          (steps.stats_freshness.conclusion == 'failure') ||
          (steps.axe_freshness.conclusion == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'data-review',
              state: 'open'
            });

            if (issues.length > 0) {
              console.log('An open data review issue already exists:', issues[0].html_url);
              return;
            }

            const statsStale = '${{ steps.stats_freshness.conclusion }}' === 'failure';
            const axeStale = '${{ steps.axe_freshness.conclusion }}' === 'failure';

            const sections = [];

            if (statsStale) {
              sections.push(`### Statistics Canada disability prevalence data

            The data in [\`src/data/statistics-canada-disability-stats.js\`](../blob/main/src/data/statistics-canada-disability-stats.js) is past its review date.

            **Action required:**
            1. Check for a new Canadian Survey on Disability (CSD) release:
               - [Statistics Canada CSD publications](https://www150.statcan.gc.ca/n1/pub/89-654-x/index-eng.htm)
               - The CSD is conducted every 5 years; the next full cycle is expected ~2027.
               - Check for interim estimates or supplemental releases.
            2. Review supplemental sources:
               - [CNIB / Fighting Blindness Canada](https://cnib.ca/en/sight-loss-info/blindness/) (vision loss)
               - [Canadian Hearing Services](https://www.chs.ca/) (deaf population)
               - [Health Canada / PHAC epilepsy data](https://www.canada.ca/en/public-health/services/chronic-diseases/epilepsy.html)
            3. Update \`src/data/statistics-canada-disability-stats.js\`:
               - Update \`vintage_year\` if a new CSD release is available
               - Update \`next_review_date\` to one year from today
               - Update \`canada_population\` to the latest Statistics Canada estimate
               - Update \`fps_rates\` entries with new figures and source notes
            4. Update \`src/config/config.yaml\` prevalence_rates to match.`);
            }

            if (axeStale) {
              sections.push(`### axe-to-FPS mapping

            The mapping in [\`src/data/axe-to-fps.js\`](../blob/main/src/data/axe-to-fps.js) is past its bi-annual review date.

            **Action required:**
            1. Check installed axe-core version: \`npm list @axe-core/playwright\`
            2. Review the [axe-core rules changelog](https://github.com/dequelabs/axe-core/blob/develop/CHANGELOG.md) for new or changed rules since last review.
            3. Cross-reference new rules against [CAN/ASC EN 301 549:2024 Annex B](https://accessible.canada.ca/creating-accessibility-standards/canasc-en-301-5492024-accessibility-requirements-ict-products-and-services/annex-b-informative-relationship-between-requirements-and-functional-performance-statements) to determine FPS mappings.
            4. Update \`src/data/axe-to-fps.js\`:
               - Add entries for any new axe-core rules
               - Correct any changed FPS mappings
               - Update the \`Next review:\` date in the file header comment
            5. Run \`npm test\` to verify all FPS codes remain valid.`);
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Data freshness review: Update methodology reference data',
              labels: ['data-review'],
              body: `## Data Freshness Review Required

            The scheduled freshness check has detected that one or more reference data sources in Daily CAP need review.

            ${sections.join('\n\n---\n\n')}

            ---

            Run \`npm test\` after any updates to verify nothing is broken.

            See [FEATURES.md](../blob/main/FEATURES.md) for the review schedule and data source references.
            `
            });

            console.log('Created issue:', issue.html_url);
