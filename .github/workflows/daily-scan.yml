name: Daily CAP Scan

on:
  schedule:
    # Run daily at 09:30 UTC
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Run date (YYYY-MM-DD)'
        required: false
        type: string
      url_limit:
        description: 'URL limit override'
        required: false
        type: string
      source_mode:
        description: 'Source mode (live or seed)'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - seed
      scan_mode:
        description: 'Scan mode (live or mock)'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - mock

permissions:
  contents: write

concurrency:
  group: daily-cap-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      RUN_DATE: ${{ inputs.run_date }}
      URL_LIMIT: ${{ inputs.url_limit }}
      SOURCE_MODE: ${{ inputs.source_mode || 'live' }}
      SCAN_MODE: ${{ inputs.scan_mode || 'live' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Export Chrome path
        run: echo "CHROME_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run CAP scan pipeline
        id: pipeline
        shell: bash
        run: |
          set +e
          ARGS=(--mode "$SCAN_MODE" --source-mode "$SOURCE_MODE")
          if [[ -n "$RUN_DATE" ]]; then ARGS+=(--date "$RUN_DATE"); fi
          if [[ -n "$URL_LIMIT" ]]; then ARGS+=(--limit "$URL_LIMIT"); fi
          node run.js "${ARGS[@]}"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-cap-run-artifacts
          path: |
            docs/reports/daily/
          if-no-files-found: warn

      - name: Commit and push reports
        if: steps.pipeline.outputs.exit_code == '0'
        shell: bash
        run: |
          if git diff --quiet -- docs/reports/ docs/index.html; then
            echo "No report changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ docs/index.html
          git commit -m "chore: publish daily CAP report $(date -u +%Y-%m-%d)"
          # Rebase onto latest main to avoid non-fast-forward rejection when a
          # concurrent or sequential run has already pushed. Use -X theirs so
          # add/add conflicts in docs/reports resolve in favour of this run's output.
          git pull --rebase -X theirs origin main
          git push

      - name: Generate step summary
        if: steps.pipeline.outputs.exit_code == '0'
        shell: bash
        run: |
          if [[ -n "$RUN_DATE" ]]; then
            node src/cli/generate-summary.js --date "$RUN_DATE"
          else
            node src/cli/generate-summary.js
          fi

      - name: Fail workflow on pipeline error
        if: steps.pipeline.outputs.exit_code != '0'
        run: |
          echo "Pipeline exited with code ${{ steps.pipeline.outputs.exit_code }}"
          exit 1
